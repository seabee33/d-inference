<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="660" height="400" fill="#ffffff"/>
  <text x="30" y="30" font-size="17" font-weight="700" fill="#1a1a1a">Cold prefill cost vs prompt size — Gemma-4 26B (M5 Max)</text>
  <text x="30" y="49" font-size="11" fill="#666">The per-request prefill a long-prefix KV cache would avoid on a warm hit · commit ae5bb5ad</text>

  <!-- axes: x 0..100k tok -> 80..560 ; y 0..80000ms -> 320..60 -->
  <g font-size="10" fill="#999">
    <line x1="80" y1="320" x2="560" y2="320" stroke="#eee"/><text x="40" y="324">0 s</text>
    <line x1="80" y1="255" x2="560" y2="255" stroke="#eee"/><text x="38" y="259">20 s</text>
    <line x1="80" y1="190" x2="560" y2="190" stroke="#eee"/><text x="38" y="194">40 s</text>
    <line x1="80" y1="125" x2="560" y2="125" stroke="#eee"/><text x="38" y="129">60 s</text>
    <line x1="80" y1="60" x2="560" y2="60" stroke="#eee"/><text x="38" y="64">80 s</text>
  </g>
  <line x1="80" y1="60" x2="80" y2="320" stroke="#999"/>
  <line x1="80" y1="320" x2="560" y2="320" stroke="#999"/>
  <text x="22" y="190" font-size="11" fill="#666" transform="rotate(-90 22 190)" text-anchor="middle">cold prefill TTFT</text>
  <text x="320" y="360" font-size="11" fill="#666" text-anchor="middle">prompt length (tokens)</text>

  <!-- x ticks -->
  <g font-size="10" fill="#999" text-anchor="middle">
    <text x="84.9" y="336">1k</text>
    <text x="158.6" y="336">16k</text>
    <text x="237.3" y="336">32k</text>
    <text x="394.6" y="336">64k</text>
    <text x="560" y="336">100k</text>
  </g>

  <!-- area under curve (the avoidable cost) -->
  <polygon points="84.9,318.8 99.7,315.4 158.6,299.6 237.3,271.5 394.6,194.3 560.0,78.9 560,320 84.9,320"
           fill="#c0392b" opacity="0.08"/>

  <!-- the curve -->
  <polyline points="84.9,318.8 99.7,315.4 158.6,299.6 237.3,271.5 394.6,194.3 560.0,78.9"
            fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <g fill="#c0392b">
    <circle cx="84.9" cy="318.8" r="3.5"/><circle cx="99.7" cy="315.4" r="3.5"/>
    <circle cx="158.6" cy="299.6" r="3.5"/><circle cx="237.3" cy="271.5" r="3.5"/>
    <circle cx="394.6" cy="194.3" r="3.5"/><circle cx="560.0" cy="78.9" r="3.5"/>
  </g>

  <!-- point labels -->
  <g font-size="9.5" fill="#c0392b" font-weight="600">
    <text x="120" y="312" text-anchor="middle">1.4 s</text>
    <text x="158.6" y="293" text-anchor="middle">6.3 s</text>
    <text x="237.3" y="265" text-anchor="middle">14.9 s</text>
    <text x="394.6" y="188" text-anchor="middle">38.7 s</text>
  </g>
  <text x="556" y="74" font-size="13" font-weight="700" fill="#c0392b" text-anchor="end">74 s @ 100k</text>

  <!-- callout box -->
  <rect x="92" y="78" width="290" height="86" fill="#f7f7f7" stroke="#ddd" rx="4"/>
  <text x="104" y="98" font-size="11.5" font-weight="700" fill="#1a1a1a">A repeated 100k prefix costs ~74 s of prefill</text>
  <text x="104" y="114" font-size="11" fill="#444">every request — until it is reused from the cache.</text>
  <text x="104" y="134" font-size="10.5" fill="#666">Restore past the sliding window is bit-exact (verified</text>
  <text x="104" y="148" font-size="10.5" fill="#666">at L=2048/4096 &gt; 1024). The boundary cap that blocks</text>
  <text x="104" y="162" font-size="10.5" fill="#666">long-prefix reuse is a default, not a correctness limit (#267).</text>

  <text x="80" y="384" font-size="9" fill="#aaa">Source: HybridCheckpointBenchLiveTests/gemma4LargePrefillScaling on M5 Max (128GB), real gemma-4-26b-a4b-it-8bit. Super-linear (O(n²) attention).</text>
</svg>
