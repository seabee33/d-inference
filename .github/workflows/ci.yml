name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-coordinator:
    name: Coordinator Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -race $(go list ./... | grep -v /e2e)
      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

  lint-coordinator:
    name: Coordinator Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run

  test-provider:
    name: Provider Tests
    runs-on: blacksmith-12vcpu-macos-26
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - name: Restore SwiftPM cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            provider-swift/.build
          key: spm-v1-${{ runner.os }}-${{ hashFiles('provider-swift/Package.resolved', 'libs/mlx-swift/Package.swift', 'libs/mlx-swift-lm/Package.swift') }}
          restore-keys: |
            spm-v1-${{ runner.os }}-
      - name: Build provider-swift (incl. tests)
        working-directory: provider-swift
        # Build the TEST bundle too, so the .xctest bundle exists before we
        # place the metallib next to its runner binary (see next step).
        run: swift build --build-tests
      - name: Extract mlx.metallib
        working-directory: provider-swift
        run: |
          python3 -m venv /tmp/mlxvenv
          /tmp/mlxvenv/bin/pip install 'mlx==0.31.2'
          metallib="/tmp/mlxvenv/lib/python$(/tmp/mlxvenv/bin/python -c 'import sys;print(f"{sys.version_info.major}.{sys.version_info.minor}")')/site-packages/mlx/lib/mlx.metallib"
          # MLX's C++ loader (device.cpp load_default_library) searches for the
          # metallib COLOCATED WITH THE RUNNING BINARY. Under `swift test` the
          # running binary is the xctest runner INSIDE the .xctest bundle, so a
          # copy in .build/debug alone is not found — it must sit next to the
          # runner. Place it in both locations to cover `swift run`/built-binary
          # paths and the test runner. Fail loudly if the source isn't there.
          test -f "$metallib" || { echo "::error::mlx.metallib not found at $metallib"; exit 1; }
          cp "$metallib" .build/debug/mlx.metallib
          for bundle in .build/debug/*PackageTests.xctest; do
            macos="$bundle/Contents/MacOS"
            if [ -d "$macos" ]; then
              cp "$metallib" "$macos/mlx.metallib"
              echo "placed metallib in $macos"
            fi
          done
      - name: Run Swift tests
        working-directory: provider-swift
        # NOTE: do NOT pass --build-tests-relinking flags; the bundle is already
        # built above, so `swift test` reuses it (and our colocated metallib).
        run: swift test

  cache-swift:
    name: Swift Build + Cache
    runs-on: blacksmith-12vcpu-macos-26
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - name: Restore SwiftPM cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            provider-swift/.build
          key: spm-v1-${{ runner.os }}-${{ hashFiles('provider-swift/Package.resolved', 'libs/mlx-swift/Package.swift', 'libs/mlx-swift-lm/Package.swift') }}
          restore-keys: |
            spm-v1-${{ runner.os }}-
      - name: Build provider-swift
        working-directory: provider-swift
        run: swift build -c release --product darkbloom
      - name: Save SwiftPM cache
        uses: actions/cache/save@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            provider-swift/.build
          key: spm-v1-${{ runner.os }}-${{ hashFiles('provider-swift/Package.resolved', 'libs/mlx-swift/Package.swift', 'libs/mlx-swift-lm/Package.swift') }}

  lint-console:
    name: Console UI Lint & Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: console-ui/package-lock.json
      - name: Install dependencies
        run: cd console-ui && npm ci
      - name: Lint
        run: cd console-ui && npx eslint src/
      - name: Build
        run: cd console-ui && npm run build
