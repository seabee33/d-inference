name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-coordinator:
    name: Coordinator Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -race $(go list ./... | grep -v /e2e)
      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

  lint-coordinator:
    name: Coordinator Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run

  test-provider:
    name: Provider Tests
    runs-on: blacksmith-12vcpu-macos-26
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run tests
        run: |
          cd provider
          # Skip proxy and server integration tests — they require SIP enabled
          # which is not available on GitHub Actions macOS runners.
          # These tests run locally on real Macs via the pre-push hook.
          cargo test -- --skip proxy::tests --skip server::tests
      - name: Check formatting
        run: cd provider && cargo fmt --check
      - name: Clippy
        run: cd provider && cargo clippy

  lint-console:
    name: Console UI Lint & Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: console-ui/package-lock.json
      - name: Install dependencies
        run: cd console-ui && npm ci
      - name: Lint
        run: cd console-ui && npx eslint src/
      - name: Build
        run: cd console-ui && npm run build
